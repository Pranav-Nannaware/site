  <style>
    .logo-text { font-family: Arial, sans-serif; font-weight: bold; }
    .main-text { font-size: 24px; fill: #0056b3; }
    .sub-text { font-size: 12px; fill: #333; }
  </style>
  <rect width="200" height="60" fill="white"/>
  <text x="10" y="30" class="logo-text main-text">CMRIT</text>
